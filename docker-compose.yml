services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    # Cloud Run expects PORT=8080
    ports:
      - "3000:8080"
    env_file:
      - .env
    environment:
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      LOCAL_STORAGE_ROOT: /data/uploads
      PORT: 8080
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  app_data:
