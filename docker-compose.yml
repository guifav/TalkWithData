services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    # Cloud Run expects PORT=8080
    ports:
      - "3000:8080"
    env_file:
      - .env
    environment:
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      LOCAL_STORAGE_ROOT: /data/uploads
      PORT: 8080
    volumes:
      - app_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  app_data:
