name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer version without leading v
        required: true
        type: string
      owner_authorization_url:
        description: Permanent GitHub issue or comment URL recorded in PROVENANCE.md
        required: true
        type: string
      dry_run:
        description: Build release artifacts without publishing tag or GitHub Release
        required: true
        default: true
        type: boolean

permissions:
  actions: read
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install thumbnail dependencies
        working-directory: functions/generate-thumbnail
        run: npm ci

      - name: Verify release readiness
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/check-release-readiness.mjs \
            --version "${{ inputs.version }}" \
            --require-merged-main \
            --require-ci-success \
            --required-workflow "CI" \
            --required-workflow "Dependency pin review"

      - name: Package thumbnail function
        working-directory: functions/generate-thumbnail
        run: npm run build && npm run package:release

      - name: Prepare release artifacts
        run: node scripts/prepare-release.mjs --version "${{ inputs.version }}"

      - name: Upload release candidate artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v7.0.1
        with:
          name: release-candidate-v${{ inputs.version }}
          path: dist/release/v${{ inputs.version }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          node scripts/check-release-readiness.mjs \
            --version "$VERSION" \
            --owner-authorization-url "${{ inputs.owner_authorization_url }}" \
            --require-complete-checklist \
            --require-owner-authorization \
            --require-merged-main \
            --require-ci-success \
            --required-workflow "CI" \
            --required-workflow "Dependency pin review"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "v$VERSION" --message "Talk With Data v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" \
            "dist/release/v$VERSION"/* \
            --title "Talk With Data v$VERSION" \
            --notes-file "dist/release/v$VERSION/RELEASE_NOTES.md"
          node scripts/check-release-readiness.mjs \
            --version "$VERSION" \
            --owner-authorization-url "${{ inputs.owner_authorization_url }}" \
            --require-complete-checklist \
            --require-owner-authorization \
            --require-merged-main \
            --require-tag \
            --require-github-release
