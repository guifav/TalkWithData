name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer version without leading v
        required: true
        type: string
      owner_authorization_url:
        description: Permanent GitHub issue comment URL recorded in PROVENANCE.md. Required only when dry_run is false.
        required: false
        type: string
      dry_run:
        description: Build release artifacts without publishing tag or GitHub Release
        required: true
        default: true
        type: boolean

permissions:
  actions: read
  contents: read
  issues: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install thumbnail dependencies
        working-directory: functions/generate-thumbnail
        run: npm ci

      - name: Verify release readiness
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          node scripts/check-release-readiness.mjs \
            --version "$VERSION" \
            --require-merged-main \
            --require-ci-success \
            --required-workflow "CI" \
            --required-workflow "Dependency pin review"

      - name: Package thumbnail function
        working-directory: functions/generate-thumbnail
        run: npm run build && npm run package:release

      - name: Prepare release artifacts
        env:
          VERSION: ${{ inputs.version }}
        run: node scripts/prepare-release.mjs --version "$VERSION"

      - name: Upload release candidate artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v7.0.1
        with:
          name: release-candidate-v${{ inputs.version }}
          path: dist/release/v${{ inputs.version }}
          if-no-files-found: error
          retention-days: 14

  publish:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ github.ref == 'refs/heads/main' && inputs.dry_run == false }}
    concurrency:
      group: release-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: write
      issues: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Download release candidate artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh run download "$GITHUB_RUN_ID" --name "release-candidate-v$VERSION" --dir "dist/release/v$VERSION"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          OWNER_AUTHORIZATION_URL: ${{ inputs.owner_authorization_url }}
          TAG: v${{ inputs.version }}
        run: |
          set -euo pipefail
          node scripts/check-release-readiness.mjs \
            --version "$VERSION" \
            --owner-authorization-url "$OWNER_AUTHORIZATION_URL" \
            --require-complete-checklist \
            --require-owner-authorization \
            --require-final-changelog \
            --require-newer-than-tags \
            --require-merged-main \
            --require-ci-success \
            --require-tag-absent \
            --require-github-release-absent \
            --required-workflow "CI" \
            --required-workflow "Dependency pin review"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          CREATED_REMOTE_TAG=false
          CREATED_DRAFT_RELEASE=false
          PUBLISHED_RELEASE=false

          cleanup_draft_release() {
            release_view_output=""
            release_view_status=0
            is_draft=""
            release_view_output="$(gh release view "$TAG" --json isDraft --jq .isDraft 2>&1)" || release_view_status=$?
            if [ "$release_view_status" -eq 0 ]; then
              is_draft="$release_view_output"
            elif echo "$release_view_output" | grep -Eiq "release not found|not found"; then
              is_draft=""
            else
              return 0
            fi

            if [ "$CREATED_DRAFT_RELEASE" = "true" ] && [ "$PUBLISHED_RELEASE" != "true" ]; then
              if [ "$is_draft" = "true" ]; then
                gh release delete "$TAG" --yes --cleanup-tag >/dev/null 2>&1 || true
              elif [ -z "$is_draft" ] && [ "$CREATED_REMOTE_TAG" = "true" ]; then
                remote_tag_commit="$(git ls-remote origin "refs/tags/$TAG^{}" | awk '{print $1}' || true)"
                if [ "$remote_tag_commit" = "$GITHUB_SHA" ]; then
                  git push --delete origin "$TAG" >/dev/null 2>&1 || true
                fi
              fi
            elif [ "$CREATED_REMOTE_TAG" = "true" ] && [ "$PUBLISHED_RELEASE" != "true" ]; then
              remote_tag_commit="$(git ls-remote origin "refs/tags/$TAG^{}" | awk '{print $1}' || true)"
              if [ -z "$is_draft" ] && [ "$remote_tag_commit" = "$GITHUB_SHA" ]; then
                git push --delete origin "$TAG" >/dev/null 2>&1 || true
              fi
            fi
          }
          trap cleanup_draft_release ERR

          git tag --annotate "$TAG" --message "Talk With Data $TAG"
          git push origin "refs/tags/$TAG"
          CREATED_REMOTE_TAG=true

          gh release create "$TAG" \
            --verify-tag \
            --draft \
            --title "Talk With Data $TAG" \
            --notes-file "dist/release/$TAG/RELEASE_NOTES.md"
          CREATED_DRAFT_RELEASE=true

          gh release upload "$TAG" "dist/release/$TAG"/*
          gh release edit "$TAG" --draft=false
          PUBLISHED_RELEASE=true
          trap - ERR

          node scripts/check-release-readiness.mjs \
            --version "$VERSION" \
            --owner-authorization-url "$OWNER_AUTHORIZATION_URL" \
            --require-complete-checklist \
            --require-owner-authorization \
            --require-final-changelog \
            --require-merged-main \
            --require-tag \
            --require-github-release
