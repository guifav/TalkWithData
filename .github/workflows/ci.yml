name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16@sha256:be01cf82fc7dbba824acf0a82e150b4b360f3ff93c6631d7844af431e841a95c # postgres:16, resolved 2026-07-11
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: talkwithdata
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d talkwithdata"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: app
    env:
      CI: true
      STORAGE_PROVIDER: local
      LOCAL_STORAGE_ROOT: /tmp/talkwithdata-uploads
      ALLOWED_AUTH_DOMAIN: example.com
      STORAGE_BUCKET_NAME: test-bucket
      FIREBASE_PROJECT_ID: test-project
      NEXT_PUBLIC_FIREBASE_API_KEY: test-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: test-project.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: test-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: test-project.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789012"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789012:web:test"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/talkwithdata
      DASHBOARD_SESSION_SECRET: test-secret-key-for-ci-only
      APP_URL: http://localhost:3000
      ANTHROPIC_API_KEY: test-key
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Java for Firebase Emulator
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Test environment setup contract
        run: node --test ../scripts/check-env.test.mjs

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Test Prisma migrations
        run: npm run test:migrations

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:coverage

      - name: Test Firestore security rules
        run: npx -y firebase-tools@15.23.0 emulators:exec --config ../firebase.json --project test-project --only firestore "npm run test:firestore-rules"

      - name: Build
        run: npm run build

  functions-generate-thumbnail:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions/generate-thumbnail
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/generate-thumbnail/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
