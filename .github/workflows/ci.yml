name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: talkwithdata
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d talkwithdata"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: app
    env:
      CI: true
      STORAGE_PROVIDER: local
      LOCAL_STORAGE_ROOT: /tmp/talkwithdata-uploads
      ALLOWED_AUTH_DOMAIN: example.com
      STORAGE_BUCKET_NAME: test-bucket
      FIREBASE_PROJECT_ID: test-project
      NEXT_PUBLIC_FIREBASE_API_KEY: test-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: test-project.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: test-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: test-project.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789012"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789012:web:test"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/talkwithdata
      DASHBOARD_SESSION_SECRET: test-secret-key-for-ci-only
      APP_URL: http://localhost:3000
      ANTHROPIC_API_KEY: test-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
