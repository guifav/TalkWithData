name: Dependency pin review

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/dependency-pin-review.yml"
      - "scripts/check-ci-image-pins.sh"
      - "CONTRIBUTING.md"
      - "docker-compose.yml"
      - "docs/DEPLOYMENT.md"
  schedule:
    - cron: "30 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  container-image-pins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify container image pins
        run: ./scripts/check-ci-image-pins.sh
